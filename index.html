<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Laude Dashboard 🎭</title>
    <link rel="stylesheet" href="css/mobile.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎭</text></svg>">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <h1>🎭 Laude</h1>
                <span class="status-indicator" id="statusIndicator">● Online</span>
            </div>
        </header>

        <!-- Stats Grid -->
        <section class="stats-section">
            <div class="stat-card">
                <div class="stat-value" id="fileCount">27</div>
                <div class="stat-label">Files</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="activeAgents">0</div>
                <div class="stat-label">Agents</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="tasksDone">4</div>
                <div class="stat-label">Done</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalSize">68KB</div>
                <div class="stat-label">Size</div>
            </div>
        </section>

        <!-- Quick Actions -->
        <section class="actions-section">
            <h2>⚡ Quick Actions</h2>
            <div class="action-grid">
                <button class="action-btn" onclick="spawnAgent()">
                    <span class="btn-icon">🤖</span>
                    <span>New Agent</span>
                </button>
                <button class="action-btn" onclick="generateReport()">
                    <span class="btn-icon">📄</span>
                    <span>Report</span>
                </button>
                <button class="action-btn" onclick="checkHeartbeat()">
                    <span class="btn-icon">💓</span>
                    <span>Heartbeat</span>
                </button>
                <button class="action-btn" onclick="viewTasks()">
                    <span class="btn-icon">📋</span>
                    <span>Tasks</span>
                </button>
            </div>
        </section>

        <!-- Recent Tasks -->
        <section class="tasks-section">
            <h2>📋 Recent Tasks</h2>
            <div class="task-list" id="taskList">
                <div class="task-item completed">
                    <span class="task-status">✅</span>
                    <div class="task-info">
                        <div class="task-title">Setup Identity Files</div>
                        <div class="task-time">01:08</div>
                    </div>
                </div>
                <div class="task-item failed">
                    <span class="task-status">❌</span>
                    <div class="task-info">
                        <div class="task-title">Weather Check (Kolkata)</div>
                        <div class="task-time">01:10</div>
                    </div>
                </div>
                <div class="task-item completed">
                    <span class="task-status">✅</span>
                    <div class="task-info">
                        <div class="task-title">Create Dashboard UI</div>
                        <div class="task-time">01:15</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-btn active" onclick="showSection('home')">
                <span>🏠</span>
                <span>Home</span>
            </button>
            <button class="nav-btn" onclick="showSection('agents')">
                <span>🤖</span>
                <span>Agents</span>
            </button>
            <button class="nav-btn" onclick="showSection('tasks')">
                <span>📋</span>
                <span>Tasks</span>
            </button>
            <button class="nav-btn" onclick="showSection('settings')">
                <span>⚙️</span>
                <span>Settings</span>
            </button>
        </nav>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script src="js/app.js"></script>
</body>
</html>
