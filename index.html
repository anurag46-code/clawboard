<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Laude Dashboard 🎭</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="modern.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎭</text></svg>">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <div class="logo">
                    <span class="emoji">🎭</span>
                    <h1>Laude</h1>
                </div>
                <div class="status-badge">
                    <span class="dot"></span>
                    <span>Online</span>
                </div>
            </div>
        </header>

        <!-- Stats Grid -->
        <section class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">📂</div>
                <div class="stat-value" id="fileCount">27</div>
                <div class="stat-label">Files</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🤖</div>
                <div class="stat-value" id="activeAgents">0</div>
                <div class="stat-label">Agents</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-value" id="tasksDone">4</div>
                <div class="stat-label">Done</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📦</div>
                <div class="stat-value" id="totalSize">68KB</div>
                <div class="stat-label">Size</div>
            </div>
        </section>

        <!-- Quick Actions -->
        <section class="actions-section">
            <h2 class="section-title">Quick Actions</h2>
            <div class="action-grid">
                <button class="action-btn" onclick="spawnAgent()">
                    <div class="btn-icon">🤖</div>
                    <div class="btn-text">New Agent</div>
                </button>
                <button class="action-btn" onclick="generateReport()">
                    <div class="btn-icon">📄</div>
                    <div class="btn-text">Report</div>
                </button>
                <button class="action-btn" onclick="checkHeartbeat()">
                    <div class="btn-icon">💓</div>
                    <div class="btn-text">Heartbeat</div>
                </button>
                <button class="action-btn" onclick="viewTasks()">
                    <div class="btn-icon">📋</div>
                    <div class="btn-text">Tasks</div>
                </button>
            </div>
        </section>

        <!-- Recent Tasks -->
        <section class="tasks-section">
            <h2 class="section-title">Recent Tasks</h2>
            <div class="task-list" id="taskList">
                <div class="task-item completed">
                    <div class="task-icon">✅</div>
                    <div class="task-content">
                        <div class="task-title">Setup Identity Files</div>
                        <div class="task-meta">01:08 • Completed</div>
                    </div>
                </div>
                <div class="task-item failed">
                    <div class="task-icon">❌</div>
                    <div class="task-content">
                        <div class="task-title">Weather Check (Kolkata)</div>
                        <div class="task-meta">01:10 • Failed</div>
                    </div>
                </div>
                <div class="task-item completed">
                    <div class="task-icon">✅</div>
                    <div class="task-content">
                        <div class="task-title">Create Dashboard UI</div>
                        <div class="task-meta">01:15 • Completed</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-btn active" onclick="showSection('home')">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Home</span>
            </button>
            <button class="nav-btn" onclick="showSection('agents')">
                <span class="nav-icon">🤖</span>
                <span class="nav-label">Agents</span>
            </button>
            <button class="nav-btn" onclick="showSection('tasks')">
                <span class="nav-icon">📋</span>
                <span class="nav-label">Tasks</span>
            </button>
            <button class="nav-btn" onclick="showSection('settings')">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label">Settings</span>
            </button>
        </nav>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script src="app.js"></script>
</body>
</html>
